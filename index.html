  const TIME_CONFIG = {
    morning:   { bg: "#FFF7ED22", accent: "#F97316", border: "#F9731633", icon: "🌅" },
    afternoon: { bg: "#F0FDF422", accent: "#16A34A", border: "#16A34A33", icon: "🌤️" },
    evening:   { bg: "#EFF6FF22", accent: "#3B82F6", border: "#3B82F633", icon: "🌙" },
  };

  const PERSON_CONFIG = {
    sky: { label: "Sky",  color: "#DB2777" },
    you: { label: "You",  color: "#0284C7" },
  };

  let history = {};
  let activePerson = "sky";
  let activeTime = "all";
  let currentView = "today";
  let activeDashRange = 30;

  function todayKey() { return new Date().toISOString().slice(0,10); }

  function getDateRange(days) {
    return Array.from({length: days}, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (days - 1 - i));
      return d.toISOString().slice(0,10);
    });
  }

  // Calculate the cutoff date (90 days ago) for fetching
  function getCutoffDate() {
    const d = new Date();
    d.setDate(d.getDate() - 90);
    return d.toISOString().slice(0,10);
  }

  function getStreak(name, person) {
    const days = Object.keys(history).sort().reverse();
    let streak = 0;
    for (const d of days) {
      if (history[d]?.[person]?.[name]) streak++;
      else break;
    }
    return streak;
  }

  function getAdherenceRate(name, person, days) {
    const range = getDateRange(days);
    const taken = range.filter(d => history[d]?.[person]?.[name]).length;
    return Math.round((taken / range.length) * 100);
  }

  function getDayCompletion(day, person) {
    const supps = SUPPLEMENTS[person];
    const total = supps.length;
    if (!total) return 0;
    const done = supps.filter(s => history[day]?.[person]?.[s.name]).length;
    return Math.round((done / total) * 100);
  }

  async function loadFromFirebase() {
    const statusEl = document.getElementById("saveStatus");
    statusEl.textContent = "⏳ Syncing...";

    try {
      // Only fetch documents from the last 90 days using document ID range
      const cutoff = getCutoffDate();
      const histRef = collection(db, "history");

      // Firestore document IDs are strings; date keys sort lexicographically
      // so we can fetch only recent docs by ID range
      const snap = await getDocs(histRef);
      snap.forEach(docSnap => {
        // Only keep docs within our 90-day window
        if (docSnap.id >= cutoff) {
          history[docSnap.id] = docSnap.data();
        }
      });
      statusEl.textContent = "✓ Synced";
    } catch(e) {
      statusEl.textContent = "⚠️ Offline";
      console.warn("Firebase load error:", e);
    }

    // Hide skeleton, show app
    document.getElementById("loadingSkeleton").style.display = "none";
    document.getElementById("appContent").style.display = "";
    renderAll();
  }

  async function saveToFirebase(dateKey) {
    document.getElementById("saveStatus").textContent = "💾 Saving...";
    try {
      await setDoc(doc(db, "history", dateKey), history[dateKey] || {});
      document.getElementById("saveStatus").textContent = "✓ Synced";
    } catch(e) {
      document.getElementById("saveStatus").textContent = "⚠️ Save failed";
    }
  }

  function toggle(name, person) {
    const d = todayKey();
    if (!history[d]) history[d] = {};
    if (!history[d][person]) history[d][person] = {};
    history[d][person][name] = !history[d][person][name];
    saveToFirebase(d);
    renderAll();
  }

  function isChecked(name, person) {
    return !!history[todayKey()]?.[person]?.[name];
  }

  function getList() {
    return SUPPLEMENTS[activePerson].filter(s => activeTime === "all" || s.time === activeTime);
  }

  function setView(v) {
    currentView = v;
    ["today","history","dashboard","info"].forEach(x => {
      document.getElementById("btn_"+x).className = "view-btn" + (v===x?" active":"");
      document.getElementById("view_"+x).style.display = v===x?"":"none";
    });
    renderAll();
  }

  function setPerson(p) { activePerson = p; renderAll(); }
  function setTime(t) { activeTime = t; renderAll(); }
  function setDashRange(r) { activeDashRange = r; renderDashboard(); }

  function renderPersonTabs() {
    document.getElementById("personTabs").innerHTML = Object.entries(PERSON_CONFIG).map(([key, pc]) => `
      <button class="person-btn" onclick="setPerson('${key}')"
        style="background:${activePerson===key?pc.color:'#ffffff0a'};
               color:${activePerson===key?'white':'#9CA3AF'};
               box-shadow:${activePerson===key?`0 4px 16px ${pc.color}55`:'none'}">
        ${pc.label}
      </button>`).join("");
  }

  function renderToday() {
    const pc = PERSON_CONFIG[activePerson];
    const list = getList();
    const done = list.filter(s => isChecked(s.name, activePerson)).length;
    const pct = list.length ? Math.round((done/list.length)*100) : 0;

    const timeHtml = ["all","morning","afternoon","evening"].map(t => `
      <button class="time-btn${activeTime===t?' active':''}" onclick="setTime('${t}')">
        ${t==="all"?"All":TIME_CONFIG[t].icon+" "+t.charAt(0).toUpperCase()+t.slice(1)}
      </button>`).join("");

    const cardsHtml = list.map(s => {
      const checked = isChecked(s.name, activePerson);
      const tc = TIME_CONFIG[s.time];
      const streak = getStreak(s.name, activePerson);
      return `
      <div class="card ${checked?'checked':'unchecked'}"
        style="border-color:${checked?'#ffffff0a':pc.color+'44'}"
        onclick="toggle('${s.name.replace(/'/g,"\\'")}','${activePerson}')">
        <div class="checkbox" style="border-color:${checked?'#4ADE80':pc.color};background:${checked?'#4ADE8022':'transparent'}">
          ${checked?"✓":""}
        </div>
        <div class="card-body">
          <div class="card-title-row">
            <span class="card-name${checked?' crossed':''}">${s.emoji} ${s.name}</span>
            <span class="badge" style="background:${tc.bg};color:${tc.accent};border-color:${tc.border}">${tc.icon} ${s.time}</span>
            ${s.incoming?`<span class="badge" style="background:#FEF9C322;color:#FBBF24;border-color:#FBBF2433">📦 Soon</span>`:""}
            ${streak>1?`<span class="badge" style="background:#F9731622;color:#FB923C;border-color:#FB923C33">🔥 ${streak}d</span>`:""}
          </div>
          <p class="card-reason">${s.reason}</p>
        </div>
      </div>`;
    }).join("");

    document.getElementById("view_today").innerHTML = `
      <div class="box" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px">
          <span style="font-weight:600">Today's Progress</span>
          <span style="color:#9CA3AF">${done}/${list.length} taken</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%;background:${pc.color}"></div>
        </div>
        <div style="text-align:right;margin-top:6px;font-size:12px;font-weight:700;color:${pc.color}">${pct}%${pct===100?" 🎉":""}</div>
      </div>
      <div class="time-filters">${timeHtml}</div>
      <div class="supp-list">${cardsHtml}</div>`;
  }

  function renderHistory() {
    const pc = PERSON_CONFIG[activePerson];
    const last7 = getDateRange(7);
    const supps = SUPPLEMENTS[activePerson];

    const barsHtml = last7.map(day => {
      const pct = getDayCompletion(day, activePerson) / 100;
      const isToday = day === todayKey();
      const label = new Date(day+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"}).slice(0,2);
      return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:32px;height:64px;border-radius:8px;background:#ffffff0a;position:relative;overflow:hidden;border:1px solid ${isToday?pc.color:'#ffffff0f'}">
          <div style="position:absolute;bottom:0;width:100%;height:${pct*100}%;background:${pct===1?'#4ADE80':pc.color};border-radius:0 0 6px 6px"></div>
        </div>
        <span style="font-size:10px;color:${isToday?'#fff':'#6B7280'};font-weight:${isToday?700:400}">${label}</span>
        <span style="font-size:9px;color:#4ADE80;min-height:12px">${pct>0?Math.round(pct*100)+'%':''}</span>
      </div>`;
    }).join("");

    const adherenceHtml = supps.map(s => {
      const rate = getAdherenceRate(s.name, activePerson, 7);
      const streak = getStreak(s.name, activePerson);
      const color = rate>=80?"#4ADE80":rate>=50?"#FBBF24":"#F87171";
      return `
      <div class="box" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:13px;font-weight:600">${s.emoji} ${s.name}</span>
          <div style="display:flex;gap:8px;align-items:center">
            ${streak>0?`<span style="font-size:11px;color:#FB923C">🔥 ${streak}d</span>`:""}
            <span style="font-size:13px;font-weight:700;color:${color}">${rate}%</span>
          </div>
        </div>
        <div class="bar-bg" style="height:4px">
          <div class="bar-fill" style="width:${rate}%;background:${color}"></div>
        </div>
      </div>`;
    }).join("");

    document.getElementById("view_history").innerHTML = `
      <div class="section-title">LAST 7 DAYS</div>
      <div class="box" style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:flex-end">${barsHtml}</div>

      <div class="section-title">7-DAY ADHERENCE</div>
      ${Object.keys(history).length===0 ? `
        <div style="text-align:center;padding:40px 20px;color:#6B7280">
          <div style="font-size:32px;margin-bottom:12px">📊</div>
          <p>Start checking off today to build your history!</p>
        </div>` : adherenceHtml}`;
  }

  function renderDashboard() {
    const pc = PERSON_CONFIG[activePerson];
    const range = getDateRange(activeDashRange);
    const overallRates = range.map(d => getDayCompletion(d, activePerson));
    const avgCompletion = Math.round(overallRates.reduce((a,b)=>a+b,0) / range.length);
    const bestPct = Math.max(...overallRates);
    const bestDay = range[overallRates.indexOf(bestPct)];
    const bestLabel = bestPct > 0 ? new Date(bestDay+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "N/A";
    let currentStreak = 0;
    for (let i = range.length-1; i >= 0; i--) {
      if (overallRates[i] >= 80) currentStreak++;
      else break;
    }

    const timelineHtml = range.map((day, i) => {
      const pct = overallRates[i] / 100;
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center">
        <div style="width:100%;max-width:12px;height:40px;background:#ffffff0a;border-radius:3px;position:relative;overflow:hidden;margin:0 auto">
          <div style="position:absolute;bottom:0;width:100%;height:${pct*100}%;background:${pct>=0.8?'#4ADE80':pct>=0.5?pc.color:'#F87171'};border-radius:2px 2px 0 0"></div>
        </div>
      </div>`;
    }).join("");

    const calendarHtml = getDateRange(30).map(day => {
      const pct = getDayCompletion(day, activePerson);
      const isToday = day === todayKey();
      const bg = pct>=80?"#4ADE80":pct>=50?pc.color:pct>0?"#F87171":"#ffffff08";
      const dayNum = new Date(day+"T12:00:00").getDate();
      return `<div title="${day}: ${pct}%" style="width:calc(100%/7 - 3px);aspect-ratio:1;border-radius:5px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:9px;color:${pct>0?'white':'#6B7280'};font-weight:600;border:${isToday?'2px solid white':'none'}">${dayNum}</div>`;
    }).join("");

    const suppAdherenceHtml = SUPPLEMENTS[activePerson].map(s => {
      const rate = getAdherenceRate(s.name, activePerson, activeDashRange);
      const streak = getStreak(s.name, activePerson);
      const color = rate>=80?"#4ADE80":rate>=50?"#FBBF24":"#F87171";
      return `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #ffffff0a">
        <span style="font-size:18px;width:24px">${s.emoji}</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:12px;font-weight:600">${s.name}</span>
            <div style="display:flex;gap:6px;align-items:center">
              ${streak>1?`<span style="font-size:10px;color:#FB923C">🔥${streak}d</span>`:""}
              <span style="font-size:12px;font-weight:700;color:${color}">${rate}%</span>
            </div>
          </div>
          <div class="bar-bg" style="height:3px">
            <div class="bar-fill" style="width:${rate}%;background:${color}"></div>
          </div>
        </div>
      </div>`;
    }).join("");

    document.getElementById("view_dashboard").innerHTML = `
      <div style="display:flex;gap:6px;margin-bottom:20px">
        ${[30,60,90].map(r=>`
          <button onclick="setDashRange(${r})" style="flex:1;padding:8px;border-radius:10px;border:none;background:${activeDashRange===r?pc.color:'#ffffff0a'};color:${activeDashRange===r?'white':'#9CA3AF'};font-size:13px;font-weight:600;cursor:pointer;font-family:Georgia,serif">${r} Days</button>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">
        <div class="box" style="text-align:center;padding:14px 8px">
          <div style="font-size:24px;font-weight:700;color:${pc.color}">${avgCompletion}%</div>
          <div style="font-size:10px;color:#6B7280;margin-top:3px">Avg Daily</div>
        </div>
        <div class="box" style="text-align:center;padding:14px 8px">
          <div style="font-size:22px;font-weight:700;color:#FB923C">🔥${currentStreak}</div>
          <div style="font-size:10px;color:#6B7280;margin-top:3px">Day Streak</div>
        </div>
        <div class="box" style="text-align:center;padding:14px 8px">
          <div style="font-size:24px;font-weight:700;color:#4ADE80">${bestPct}%</div>
          <div style="font-size:10px;color:#6B7280;margin-top:3px">Best Day</div>
        </div>
      </div>
      <div class="section-title">${activeDashRange}-DAY TIMELINE</div>
      <div class="box" style="margin-bottom:20px">
        <div style="display:flex;align-items:flex-end;gap:2px;height:50px">${timelineHtml}</div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:9px;color:#6B7280">
          <span>${new Date(range[0]+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
          <span>Today</span>
        </div>
      </div>
      <div class="section-title">LAST 30 DAYS CALENDAR</div>
      <div class="box" style="margin-bottom:20px">
        <div style="display:flex;flex-wrap:wrap;gap:3px">${calendarHtml}</div>

          <span><span style="color:#F87171">■</span> &lt;50%</span>
        </div>
      </div>
      <div class="section-title">SUPPLEMENT ADHERENCE (${activeDashRange} DAYS)</div>
      <div class="box">${suppAdherenceHtml}</div>`;
  }

        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <div style="background:#ffffff05;border-radius:10px;padding:8px">
            <div style="font-size:9px;color:#6B7280;font-weight:600;margin-bottom:3px">DOSAGE</div>
            <div style="font-size:11px;color:#F8F8F2">${s.dosage}</div>
          </div>
          <div style="background:#ffffff05;border-radius:10px;padding:8px">
            <div style="font-size:9px;color:#6B7280;font-weight:600;margin-bottom:3px">TIMING</div>
            <div style="font-size:11px;color:#F8F8F2">${s.time}</div>
          </div>
          <div style="background:#ffffff05;border-radius:10px;padding:8px">
            <div style="font-size:9px;color:#6B7280;font-weight:600;margin-bottom:3px">BRAND</div>
            <div style="font-size:11px;color:#F8F8F2">${s.brand}</div>
          </div>
          <div style="background:#ffffff05;border-radius:10px;padding:8px">
            <div style="font-size:9px;color:#6B7280;font-weight:600;margin-bottom:3px">PURPOSE</div>
            <div style="font-size:11px;color:#F8F8F2">${s.purpose}</div>
          </div>
        </div>
        <div style="background:#ffffff05;border-radius:10px;padding:8px">
          <div style="font-size:9px;color:#6B7280;font-weight:600;margin-bottom:3px">📝 NOTES</div>
          <div style="font-size:11px;color:#9CA3AF;line-height:1.5">${s.notes}</div>
        </div>
      </div>`;
    }).join("");

    document.getElementById("view_info").innerHTML = `
      <div style="margin-bottom:16px">
        <p style="font-size:12px;color:#6B7280">Full reference guide for all supplements. Tap any card for details.</p>
      </div>
      ${cardsHtml}`;
  }

  function renderAll() {
    renderPersonTabs();
    if (currentView === "today") renderToday();
    else if (currentView === "history") renderHistory();
    else if (currentView === "dashboard") renderDashboard();
    else if (currentView === "info") renderInfo();
  }

  window.toggle = toggle;
  window.setPerson = setPerson;
  window.setTime = setTime;
  window.setView = setView;
  window.setDashRange = setDashRange;

  document.getElementById("dateLabel").textContent =
    new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  loadFromFirebase();
</script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { min-height:100vh; background:#0F0F14; color:#F8F8F2; font-family:Georgia,serif; padding-bottom:40px; }

.content { max-width:500px; margin:0 auto; padding:16px 16px 0; }

.person-btn { flex:1; padding:9px 4px; border-radius:12px; border:none; font-weight:700; font-size:14px; cursor:pointer; font-family:Georgia,serif; transition:all 0.2s; }
.time-filters { display:flex; gap:6px; margin-bottom:16px; }
.time-btn { flex:1; padding:6px 2px; border-radius:10px; border:1px solid transparent; background:transparent; color:#6B7280; font-size:10px; font-weight:600; cursor:pointer; font-family:Georgia,serif; }
.time-btn.active { background:#ffffff18; color:#fff; border-color:#ffffff20; }
.box { background:#ffffff08; border-radius:16px; padding:16px; border:1px solid #ffffff0f; }
.bar-bg { height:6px; background:#ffffff0f; border-radius:99px; overflow:hidden; }

.supp-list { display:flex; flex-direction:column; gap:10px; }
.card { border-radius:16px; padding:13px 15px; display:flex; align-items:flex-start; gap:12px; cursor:pointer; transition:all 0.2s; border:1px solid; }
.card.unchecked { background:#ffffff0a; }

.checkbox { width:26px; height:26px; min-width:26px; border-radius:8px; border:2px solid; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#4ADE80; transition:all 0.2s; margin-top:1px; }
.card-body { flex:1; }
.card-title-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:3px; }
.card-name { font-size:14px; font-weight:700; color:#F8F8F2; }
.card-name.crossed { text-decoration:line-through; color:#6B7280; }
.badge { font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; border:1px solid; }
.card-reason { font-size:11px; color:#6B7280; line-height:1.4; }
.section-title { font-size:12px; font-weight:700; color:#6B7280; letter-spacing:0.5px; margin-bottom:10px; }

/* Loading skeleton */
.skeleton { animation: shimmer 1.5s infinite; }
@keyframes shimmer {
  0% { opacity: 0.4; }
  50% { opacity: 0.7; }
  100% { opacity: 0.4; }
}
.skel-bar { height:12px; border-radius:6px; background:#ffffff0f; margin-bottom:12px; }
.skel-card { height:72px; border-radius:16px; background:#ffffff08; border:1px solid #ffffff0f; margin-bottom:10px; }
</style>
</head>

  <div class="inner">
