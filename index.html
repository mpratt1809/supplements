<title>Daily Supplements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f14; --surface: #161a22; --surface2: #1e2330; --border: #2a3045;
  --accent: #e8ff47; --accent2: #47c8ff;
  --sky: #47c8ff; --meagan: #e8ff47;
  --success: #2ed573; --danger: #ff4757; --warn: #ffa502;
  --text: #f0f2f8; --muted: #6b7592;
  --font-head: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 12px;
}
html, body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(71,200,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(232,255,71,0.05) 0%, transparent 60%);
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(13,15,20,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
}
.header-inner { max-width: 600px; margin: 0 auto; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.back-link { color: var(--muted); text-decoration: none; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }
.back-link:hover { color: var(--success); }
.header-logo { font-family: var(--font-head); font-size: 22px; letter-spacing: 3px; }
.header-logo span { color: var(--accent); }
.save-status { font-size: 11px; color: var(--success); font-family: var(--font-body); }
.date-label { color: var(--muted); font-size: 12px; letter-spacing: 1px; }

/* ── Nav tabs ── */
.tab-nav { display: flex; gap: 2px; background: var(--surface2); border-radius: var(--radius); padding: 3px; margin-top: 10px; }
.tab-btn {
  flex: 1; padding: 7px 4px; border-radius: 9px; border: none;
  font-size: 11px; font-weight: 600; cursor: pointer;
  font-family: var(--font-body); background: transparent;
  color: var(--muted); transition: all 0.2s; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.tab-btn.active { background: var(--surface); color: var(--text); }

/* ── Person toggle ── */
.person-row { display: flex; gap: 8px; margin-bottom: 16px; }
.person-btn {
  flex: 1; padding: 10px; border-radius: var(--radius); border: 2px solid var(--border);
  font-weight: 700; font-size: 14px; cursor: pointer;
  font-family: var(--font-body); background: var(--surface);
  color: var(--muted); transition: all 0.2s; letter-spacing: 1px;
  text-transform: uppercase;
}
.person-btn.active-sky    { border-color: var(--sky);    color: var(--sky);    background: rgba(71,200,255,0.08); }
.person-btn.active-meagan { border-color: var(--meagan); color: var(--meagan); background: rgba(232,255,71,0.08); }

/* ── Time filter pills ── */
.time-row { display: flex; gap: 6px; margin-bottom: 16px; }
.time-pill {
  flex: 1; padding: 6px 2px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-size: 10px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body);
  transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
}
.time-pill.active { background: var(--surface2); color: var(--text); border-color: var(--border); }

/* ── Progress bar ── */
.prog-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.prog-bar-bg { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; margin: 8px 0 4px; }
.prog-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

/* ── Supplement cards ── */
.supp-list { display: flex; flex-direction: column; gap: 8px; }
.supp-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 13px 15px;
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.supp-card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s; }
.supp-card.sky-card::before    { background: radial-gradient(circle at 0% 50%, rgba(71,200,255,0.07), transparent 70%); }
.supp-card.meagan-card::before { background: radial-gradient(circle at 0% 50%, rgba(232,255,71,0.07), transparent 70%); }
.supp-card:hover::before { opacity: 1; }
.supp-card.done { opacity: 0.45; }
.supp-card.done .supp-name { text-decoration: line-through; color: var(--muted); }

.check-box {
  width: 26px; height: 26px; min-width: 26px;
  border-radius: 7px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--success);
  transition: all 0.2s; margin-top: 1px; position: relative; z-index: 1;
}
.check-box.checked { background: rgba(46,213,115,0.15); border-color: var(--success); }

.supp-body { flex: 1; position: relative; z-index: 1; }
.supp-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
.supp-name { font-size: 14px; font-weight: 600; color: var(--text); }
.supp-reason { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* badges */
.badge {
  font-size: 9px; font-weight: 600; padding: 2px 6px;
  border-radius: 20px; border: 1px solid; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-morning   { background: rgba(249,115,22,0.12);  color: #fb923c; border-color: rgba(249,115,22,0.3); }
.badge-afternoon { background: rgba(22,163,74,0.12);   color: #4ade80; border-color: rgba(22,163,74,0.3); }
.badge-evening   { background: rgba(59,130,246,0.12);  color: #93c5fd; border-color: rgba(59,130,246,0.3); }
.badge-soon      { background: rgba(251,191,36,0.12);  color: #fbbf24; border-color: rgba(251,191,36,0.3); }
.badge-streak    { background: rgba(251,146,60,0.12);  color: #fb923c; border-color: rgba(251,146,60,0.3); }

/* ── Generic box ── */
.box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }

/* ── Section title ── */
.section-title { font-family: var(--font-head); font-size: 18px; letter-spacing: 2px; color: var(--muted); margin: 20px 0 10px; }

/* ── Stat grid ── */
.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 8px; text-align: center; }
.stat-val { font-family: var(--font-head); font-size: 28px; letter-spacing: 2px; }
.stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* ── History bars ── */
.day-bars { display: flex; justify-content: space-between; align-items: flex-end; gap: 6px; }
.day-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.day-bar-track { width: 100%; max-width: 32px; height: 60px; background: var(--surface2); border-radius: 6px; position: relative; overflow: hidden; }
.day-bar-fill  { position: absolute; bottom: 0; width: 100%; border-radius: 4px 4px 0 0; transition: height 0.4s ease; }
.day-bar-label { font-size: 9px; color: var(--muted); font-weight: 600; }
.day-bar-pct   { font-size: 9px; color: var(--success); min-height: 11px; }

/* ── Calendar ── */
.cal-grid { display: flex; flex-wrap: wrap; gap: 3px; }
.cal-day {
  width: calc(100%/7 - 3px); aspect-ratio: 1;
  border-radius: 5px; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
}
.cal-day:hover { transform: scale(1.15); box-shadow: 0 0 0 2px var(--accent2); }
.cal-day.editing { box-shadow: 0 0 0 2px var(--text) !important; transform: scale(1.1); }

/* ── Edit Day Panel ── */
.edit-day-panel {
  background: var(--surface); border: 1.5px solid var(--accent2);
  border-radius: var(--radius); padding: 16px; margin-top: 12px;
  animation: fadeSlide 0.2s ease;
}
@keyframes fadeSlide { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.edit-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.edit-day-title { font-size: 14px; font-weight: 700; color: var(--accent2); }
.edit-day-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 6px; }
.edit-day-close:hover { background: var(--surface2); color: var(--text); }
.edit-supp-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.edit-supp-row:last-child { border-bottom: none; }
.edit-check { width: 22px; height: 22px; min-width: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--success); transition: all 0.15s; }
.edit-check.checked { background: rgba(46,213,115,0.15); border-color: var(--success); }
.edit-supp-name { font-size: 13px; font-weight: 600; flex: 1; }
.edit-supp-name.struck { text-decoration: line-through; color: var(--muted); }

/* ── Supply Tracker ── */
.supply-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.supply-card.status-ok { border-left: 3px solid var(--success); }
.supply-card.status-low { border-left: 3px solid var(--warn); }
.supply-card.status-critical { border-left: 3px solid var(--danger); }
.supply-card.status-swap { border-left: 3px solid #a78bfa; }
.supply-card.status-pending { border-left: 3px solid var(--muted); }
.supply-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
.supply-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.supply-status-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
.badge-ok { background: rgba(46,213,115,0.15); color: var(--success); }
.badge-low { background: rgba(255,165,2,0.15); color: var(--warn); }
.badge-critical { background: rgba(255,71,87,0.15); color: var(--danger); }
.badge-swap { background: rgba(167,139,250,0.15); color: #a78bfa; }
.badge-pending { background: rgba(107,117,146,0.15); color: var(--muted); }
.supply-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.supply-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.supply-stat { background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
.supply-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.supply-stat-val { font-size: 13px; font-weight: 700; color: var(--text); }
.supply-stat-val.ok { color: var(--success); }
.supply-stat-val.low { color: var(--warn); }
.supply-stat-val.critical { color: var(--danger); }
.supply-bar-bg { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; margin: 6px 0 4px; }
.supply-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.supply-note { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
.supply-who { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.supply-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin: 18px 0 8px; }
.supply-summary-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.supply-summary-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
.reorder-tip { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 12px; color: var(--muted); line-height: 1.6; }
.info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
.info-cell { background: var(--surface2); border-radius: 8px; padding: 8px; }
.info-cell-label { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.info-cell-val   { font-size: 11px; color: var(--text); line-height: 1.4; }

/* ── Range pills ── */
.range-row { display: flex; gap: 6px; margin-bottom: 16px; }
.range-pill {
  flex: 1; padding: 8px; border-radius: var(--radius); border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); transition: all 0.2s;
}
.range-pill.active { border-color: var(--accent2); color: var(--accent2); background: rgba(71,200,255,0.08); }

/* ── Adherence bar ── */
.adh-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.adh-row:last-child { border-bottom: none; }
.adh-icon { font-size: 18px; width: 24px; text-align: center; }
.adh-info { flex: 1; }
.adh-name { font-size: 12px; font-weight: 600; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
.adh-bar-bg  { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.adh-bar-fill{ height: 100%; border-radius: 99px; }

/* ── Skeleton ── */
.skeleton { animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%,100%{opacity:.3} 50%{opacity:.6} }
.skel-block { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }

/* ── Main content wrap ── */
.content { max-width: 600px; margin: 0 auto; padding: 16px 16px 48px; position: relative; z-index: 1; }

/* ── Tab panels ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }
</style>
</head>

// ── State ─────────────────────────────────────────────────────
let allDocs      = [];
let activePerson = "sky";
let activeTime   = "all";
let currentView  = "today";
let dashRange    = 30;
let editingDate  = null; // non-null when editing a past day from dashboard


// ── Date helpers ───────────────────────────────────────────────
function todayKey() { return new Date().toLocaleDateString("en-CA"); }

function dateRange(days) {
  return Array.from({length: days}, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (days - 1 - i));
    return d.toLocaleDateString("en-CA");
  });
}

function cutoffKey(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toLocaleDateString("en-CA");
}

// ── Data helpers ────────────────────────────────────────────────
function getDocFor(person, date) {
  return allDocs.find(d => d.user === person && d.date === date) || null;
}

function isChecked(name, person, date) {
  return !!getDocFor(person, date || todayKey())?.taken?.[name];
}

function getStreak(name, person) {
  let streak = 0;
  const d = new Date();
  const today = todayKey();
  // If today isn't checked yet, start counting from yesterday
  if (!isChecked(name, person, today)) {
    d.setDate(d.getDate() - 1);
  }
  while (true) {
    const key = d.toLocaleDateString("en-CA");
    if (isChecked(name, person, key)) streak++;
    else break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function getAdherence(name, person, days) {
  const range = dateRange(days);
  const taken = range.filter(d => isChecked(name, person, d)).length;
  return Math.round((taken / range.length) * 100);
}

function getDayPct(date, person) {
  const supps = SUPPLEMENTS[person];
  if (!supps.length) return 0;
  const done = supps.filter(s => isChecked(s.name, person, date)).length;
  return Math.round((done / supps.length) * 100);
}

function adherenceColor(rate) {
  return rate >= 80 ? "var(--success)" : rate >= 50 ? "var(--warn)" : "var(--danger)";
}

function personColor(p) { return p === "sky" ? "var(--sky)" : "var(--meagan)"; }

// ── Firestore ───────────────────────────────────────────────────
async function loadData() {
  const status = document.getElementById("saveStatus");
  status.textContent = "⏳";
  // Always show app immediately — don't block on Firebase
  document.getElementById("skeleton").style.display = "none";
  document.getElementById("app").style.display = "";
  renderAll();
  // Then fetch in background
  try {
    const cutoff = cutoffKey(90);
    const snap = await getDocs(
      query(collection(db, "supplements"), where("date", ">=", cutoff))
    );
    allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    status.textContent = "✓ Synced";
    // Re-render all views so switching tabs shows data immediately
    renderToday();
    renderHistory();
    renderDashboard();
    if (currentView !== "today") renderAll();
  } catch(e) {
    // If where() query fails (e.g. missing index), try full collection scan
    try {
      const snap = await getDocs(collection(db, "supplements"));
      allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      status.textContent = "✓ Synced";
      renderToday();
      renderHistory();
      renderDashboard();
      if (currentView !== "today") renderAll();
    } catch(e2) {
      status.textContent = "⚠️ Offline";
      console.warn("loadData error:", e, e2);
    }
  }
}

async function saveDoc(person, date) {
  const status = document.getElementById("saveStatus");
  status.textContent = "💾";
  const rec   = getDocFor(person, date);
  const docId = rec?.id || `${person}-${date}`;
  const taken = rec?.taken || {};
  try {
    await setDoc(doc(db, "supplements", docId), { user: person, date, taken });
    if (rec) rec.taken = taken;
    status.textContent = "✓ Saved";
  } catch(e) {
    status.textContent = "⚠️ Failed";
  }
}

// ── Toggle (works for any date) ───────────────────────────────
function toggle(name, person, date) {
  date = date || todayKey();
  let rec = getDocFor(person, date);
  if (!rec) {
    rec = { id: `${person}-${date}`, user: person, date, taken: {} };
    allDocs.push(rec);
  }
  rec.taken[name] = !rec.taken[name];
  saveDoc(person, date);
  if (date === todayKey()) renderAll();
  else renderEditDay(); // only re-render the edit panel
}

}

// ── Render: Today ─────────────────────────────────────────────
function renderToday() {
  const list = SUPPLEMENTS[activePerson].filter(s => activeTime === "all" || s.time === activeTime);
  const done = list.filter(s => isChecked(s.name, activePerson)).length;
  const pct  = list.length ? Math.round((done / list.length) * 100) : 0;
  const col  = personColor(activePerson);

  const timePills = ["all","morning","afternoon","evening"].map(t => `
    <button class="time-pill${activeTime===t?" active":""}" onclick="setTime('${t}')">
      ${t==="all" ? "All" : {morning:"🌅 AM", afternoon:"🌤️ PM", evening:"🌙 Eve"}[t]}
    </button>`).join("");

  const cards = list.map(s => {
    const checked = isChecked(s.name, activePerson);
    const streak  = getStreak(s.name, activePerson);
    return `
    <div class="supp-card ${activePerson}-card${checked?" done":""}"
      style="border-color:${checked?"var(--border)":col+"44"}"
      onclick="toggle('${s.name.replace(/'/g,"\\'")}','${activePerson}')">
      <div class="check-box${checked?" checked":" "}" style="border-color:${checked?"var(--success)":col}">
        ${checked?"✓":""}
      </div>
      <div class="supp-body">
        <div class="supp-top">
          <span class="supp-name">${s.emoji} ${s.name}</span>
          <span class="badge badge-${s.time}">${s.time}</span>
          ${s.incoming ? `<span class="badge badge-soon">📦 Soon</span>` : ""}
          ${streak > 1 ? `<span class="badge badge-streak">🔥 ${streak}d</span>` : ""}
        </div>
        <p class="supp-reason">${s.reason}</p>
      </div>
    </div>`;
  }).join("");

  document.getElementById("tab_today").innerHTML = `
    <div class="prog-box">
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <span style="font-weight:600">Today's Progress</span>
        <span style="color:var(--muted)">${done}/${list.length} taken</span>
      </div>
      <div class="prog-bar-bg">
        <div class="prog-bar-fill" style="width:${pct}%;background:${col}"></div>
      </div>
      <div style="text-align:right;font-size:12px;font-weight:700;color:${col}">${pct}%${pct===100?" 🎉":""}</div>
    </div>

}

// ── Render: History ───────────────────────────────────────────
function renderHistory() {
  const col   = personColor(activePerson);
  const last7 = dateRange(7);
  const supps = SUPPLEMENTS[activePerson];

  const bars = last7.map(day => {
    const pct     = getDayPct(day, activePerson);
    const isToday = day === todayKey();
    const label   = new Date(day+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"}).slice(0,2);
    const fillColor = pct === 100 ? "var(--success)" : col;
    return `
    <div class="day-bar-wrap">
      <div class="day-bar-track" style="border:1px solid ${isToday?col:"var(--border)"}">
        <div class="day-bar-fill" style="height:${pct}%;background:${fillColor}"></div>
      </div>
      <span class="day-bar-label" style="color:${isToday?"var(--text)":"var(--muted)"}; font-weight:${isToday?700:400}">${label}</span>
      <span class="day-bar-pct">${pct > 0 ? pct+"%" : ""}</span>
    </div>`;
  }).join("");

  const adherence = supps.map(s => {
    const rate  = getAdherence(s.name, activePerson, 7);
    const streak = getStreak(s.name, activePerson);
    const color = adherenceColor(rate);
    return `
    <div class="adh-row">
      <span class="adh-icon">${s.emoji}</span>
      <div class="adh-info">
        <div class="adh-name">
          <span>${s.name}</span>
          <div style="display:flex;gap:8px;align-items:center">
            ${streak > 0 ? `<span style="font-size:10px;color:var(--warn)">🔥 ${streak}d</span>` : ""}
            <span style="color:${color};font-weight:700">${rate}%</span>
          </div>
        </div>
        <div class="adh-bar-bg"><div class="adh-bar-fill" style="width:${rate}%;background:${color}"></div></div>
      </div>
    </div>`;
  }).join("");


  document.getElementById("tab_history").innerHTML = `
    <div class="section-title">LAST 7 DAYS</div>
    <div class="box" style="margin-bottom:16px">
      <div class="day-bars">${bars}</div>
    </div>
    <div class="section-title">7-DAY ADHERENCE</div>
    ${allDocs.filter(d=>d.user===activePerson).length===0
      ? `<div class="box" style="text-align:center;padding:32px;color:var(--muted)">
           <div style="font-size:32px;margin-bottom:10px">📊</div>
           <p>Start checking off today to build your history!</p>
         </div>`

}

// ── Render: Dashboard ─────────────────────────────────────────
function renderDashboard() {
  const col   = personColor(activePerson);
  const range = dateRange(dashRange);
  const rates = range.map(d => getDayPct(d, activePerson));
  const avg   = Math.round(rates.reduce((a,b)=>a+b,0) / rates.length);
  const best  = Math.max(...rates);
  // Day streak: consecutive days at 80%+ completion, forgiving today if not yet done
  let streak = 0;
  const today = todayKey();
  const d = new Date();
  // If today isn't 80%+ yet, skip it and start from yesterday
  const todayPct = getDayPct(today, activePerson);
  if (todayPct < 80) d.setDate(d.getDate() - 1);
  while (true) {
    const key = d.toLocaleDateString("en-CA");
    const pct = getDayPct(key, activePerson);
    if (pct >= 80) { streak++; d.setDate(d.getDate() - 1); }
    else break;
    if (streak > 365) break; // safety cap
  }

  const rangePills = [30,60,90].map(r => `
    <button class="range-pill${dashRange===r?" active":""}" onclick="setDashRange(${r})">${r} Days</button>`
  ).join("");

  const timeline = range.map((_, i) => {
    const pct = rates[i] / 100;
    const bg  = pct >= 0.8 ? "var(--success)" : pct >= 0.5 ? col : pct > 0 ? "var(--danger)" : "var(--surface2)";
    return `<div style="flex:1;height:40px;background:var(--surface2);border-radius:3px;position:relative;overflow:hidden">
      <div style="position:absolute;bottom:0;width:100%;height:${pct*100}%;background:${bg};border-radius:2px 2px 0 0"></div>
    </div>`;
  }).join("");

  const calDays = dateRange(30).map(day => {
    const pct       = getDayPct(day, activePerson);
    const isToday   = day === todayKey();
    const isEditing = day === editingDate;
    const bg        = pct >= 80 ? "var(--success)" : pct >= 50 ? col : pct > 0 ? "var(--danger)" : "var(--surface2)";
    const num       = new Date(day+"T12:00:00").getDate();
    return `<div class="cal-day${isEditing?" editing":""}" title="${day}: ${pct}%"
      onclick="openEditDay('${day}')"
      style="background:${bg};color:${pct>0?"var(--text)":"var(--muted)"};border:${isToday?"2px solid var(--text)":"none"}">${num}</div>`;
  }).join("");

  const adherence = SUPPLEMENTS[activePerson].map(s => {
    const rate   = getAdherence(s.name, activePerson, dashRange);
    const streak = getStreak(s.name, activePerson);
    const color  = adherenceColor(rate);
    return `
    <div class="adh-row">
      <span class="adh-icon">${s.emoji}</span>
      <div class="adh-info">
        <div class="adh-name">
          <span>${s.name}</span>
          <div style="display:flex;gap:8px;align-items:center">
            ${streak > 1 ? `<span style="font-size:10px;color:var(--warn)">🔥 ${streak}d</span>` : ""}
            <span style="color:${color};font-weight:700">${rate}%</span>
          </div>
        </div>
        <div class="adh-bar-bg"><div class="adh-bar-fill" style="width:${rate}%;background:${color}"></div></div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("tab_dashboard").innerHTML = `
    <div class="range-row">${rangePills}</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-val" style="color:${col}">${avg}%</div>
        <div class="stat-label">Avg Daily</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--warn)">🔥${streak}</div>
        <div class="stat-label">Day Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--success)">${best}%</div>
        <div class="stat-label">Best Day</div>
      </div>
    </div>
    <div class="section-title">${dashRange}-DAY TIMELINE</div>
    <div class="box" style="margin-bottom:16px">
      <div style="display:flex;align-items:flex-end;gap:2px;height:50px">${timeline}</div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:9px;color:var(--muted)">
        <span>${new Date(range[0]+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
        <span>Today</span>
      </div>
    </div>
    <div class="section-title">LAST 30 DAYS</div>
    <div class="box" style="margin-bottom:16px">
      <div class="cal-grid">${calDays}</div>
      <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--muted)">
        <span><span style="color:var(--success)">■</span> 80%+</span>
        <span><span style="color:${col}">■</span> 50–79%</span>
        <span><span style="color:var(--danger)">■</span> &lt;50%</span>
        <span style="margin-left:auto;color:var(--accent2)">Tap a day to edit</span>
      </div>
    </div>
    <div id="edit-day-container"></div>
    <div class="section-title">ADHERENCE (${dashRange} DAYS)</div>
    <div class="box">${adherence}</div>`;
  if (editingDate) setTimeout(renderEditDay, 0);
}

// ── Edit Day (from dashboard calendar) ───────────────────────
function openEditDay(date) {
  if (editingDate === date) {
    editingDate = null;
    renderDashboard();
    return;
  }
  editingDate = date;
  renderDashboard(); // re-render to highlight selected day
  setTimeout(() => {
    const el = document.getElementById("edit-day-container");
    if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }, 100);
}

function closeEditDay() {
  editingDate = null;
  renderDashboard();
}

function renderEditDay() {
  const container = document.getElementById("edit-day-container");
  if (!container || !editingDate) return;
  const date    = editingDate;
  const d       = new Date(date + "T12:00:00");
  const label   = d.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
  const supps   = SUPPLEMENTS[activePerson];
  const done    = supps.filter(s => isChecked(s.name, activePerson, date)).length;
  const pct     = supps.length ? Math.round((done/supps.length)*100) : 0;
  const col     = personColor(activePerson);

  const rows = supps.map(s => {
    const checked = isChecked(s.name, activePerson, date);
    return `
    <div class="edit-supp-row" onclick="toggle('${s.name.replace(/'/g,"\\'")}','${activePerson}','${date}')">
      <div class="edit-check${checked?" checked":""}">${checked?"✓":""}</div>
      <span class="edit-supp-name${checked?" struck":""}"><span style="margin-right:6px">${s.emoji}</span>${s.name}</span>
      <span style="font-size:10px;color:var(--muted)">${s.time}</span>
    </div>`;
  }).join("");

  container.innerHTML = `
    <div class="edit-day-panel">
      <div class="edit-day-header">
        <div>
          <div class="edit-day-title">✏️ Editing: ${label}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${done}/${supps.length} taken · ${pct}%</div>
        </div>
        <button class="edit-day-close" onclick="closeEditDay()">✕</button>
      </div>
      <div style="height:4px;background:var(--border);border-radius:99px;margin-bottom:14px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${col};border-radius:99px;transition:width 0.3s"></div>
      </div>
      ${rows}
    </div>`;
}

  try {

// Compute days remaining based on open date + bottle count + daily dose
// If pillsRemaining override is set, use that directly
function computeDaysRemaining(s, live) {
  const dailyDose   = live.dailyDose  ?? s.dailyDose;
  // Manual override takes priority
  if (live.pillsRemaining !== undefined && live.pillsRemaining !== null && live.pillsRemaining !== "") {
    return dailyDose > 0 ? Math.floor(live.pillsRemaining / dailyDose) : 0;
  }
  const openDate    = live.openDate || null;
  const bottleCount = live.bottleCount ?? s.bottleCount;
  const bottlesOpen = live.bottlesOpen ?? 1;
  if (!openDate || s.status === "pending") return null;
  const daysPerBottle = Math.floor(bottleCount / dailyDose);
  const totalDays     = daysPerBottle * bottlesOpen;
  const opened        = new Date(openDate);
  const today         = new Date();
  const elapsed       = Math.floor((today - opened) / 86400000);
  return Math.max(0, totalDays - elapsed);
}

function computeStatus(s, live, daysLeft) {
  if (s.status === "pending") return "pending";
  if (daysLeft === 0) return "critical";
  if (s.status === "critical") return "critical";
  if (s.status === "swap") return "swap";
  if (daysLeft === null) return s.status;
  if (daysLeft <= 14)  return "critical";
  if (daysLeft <= 28)  return "low";
  return "ok";
}

async function saveSupplyEdit(key) {
  const def   = SUPPLY_DEFAULTS.find(s => s.name.replace(/\s+/g,"-").toLowerCase() === key);
  const live  = { ...supplyState[key] };
  const bottle    = document.getElementById(`sf-bottle-${key}`).value;
  const dose      = document.getElementById(`sf-dose-${key}`).value;
  const opened    = document.getElementById(`sf-opened-${key}`).value;
  const bottlesOpen = document.getElementById(`sf-bottles-${key}`).value;
  const remaining = document.getElementById(`sf-remaining-${key}`).value;
  const brand     = document.getElementById(`sf-brand-${key}`).value;
  const where     = document.getElementById(`sf-where-${key}`).value;
  if (bottle)     live.bottleCount   = parseInt(bottle);
  if (dose)       live.dailyDose     = parseInt(dose);
  if (opened)     live.openDate      = opened;
  if (bottlesOpen) live.bottlesOpen  = parseInt(bottlesOpen);
  if (remaining !== "") live.pillsRemaining = remaining === "0" ? 0 : (parseInt(remaining) || null);
  else live.pillsRemaining = null; // clear override if blank
  if (brand)      live.brand         = brand;
  if (where)      live.where         = where;
  await saveSupplyItem(key, live);
  closeSupplyEdit(key);
  renderSupply();
}

    const key  = s.name.replace(/\s+/g,"-").toLowerCase();
    const live = supplyState[key] || {};
    const bottleCount = live.bottleCount ?? s.bottleCount;
    const dailyDose   = live.dailyDose   ?? s.dailyDose;
    const daysPerBottle = dailyDose > 0 ? Math.floor(bottleCount / dailyDose) : s.daysSupply;
    const daysLeft    = computeDaysRemaining(s, live);
    const status      = computeStatus(s, live, daysLeft);
    const brand       = live.brand || s.currentBrand;
    const where       = live.where || s.where;
    const bottlesOpen = live.bottlesOpen ?? 1;
    const openDate    = live.openDate || null;
    const reorderDay  = daysLeft !== null ? Math.max(0, daysLeft - 14) : null;
    return { ...s, key, bottleCount, dailyDose, daysPerBottle, daysLeft, status, brand, where, bottlesOpen, openDate, reorderDay };
  }).sort((a,b) => statusOrder[a.status] - statusOrder[b.status]);

  const counts = { critical:0, low:0, swap:0, ok:0, pending:0 };
